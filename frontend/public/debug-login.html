<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>调试登录</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🔐 登录调试页面</h1>
    
    <div>
        <label>用户名: <input type="text" id="username" value="doctor1"></label><br>
        <label>密码: <input type="password" id="password" value="123456"></label><br>
        <button onclick="testLogin()">测试登录</button>
        <button onclick="clearStorage()">清除缓存</button>
    </div>
    
    <h2>请求详情</h2>
    <pre id="request"></pre>
    
    <h2>响应详情</h2>
    <pre id="response"></pre>
    
    <h2>localStorage</h2>
    <pre id="storage"></pre>

    <script>
        function updateStorage() {
            const storage = {
                token: localStorage.getItem('token'),
                currentDepartmentId: localStorage.getItem('currentDepartmentId')
            };
            document.getElementById('storage').textContent = JSON.stringify(storage, null, 2);
        }
        
        updateStorage();
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const requestDiv = document.getElementById('request');
            const responseDiv = document.getElementById('response');
            
            const requestData = {
                url: '/api/auth/login',
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: { username, password }
            };
            
            requestDiv.textContent = JSON.stringify(requestData, null, 2);
            responseDiv.textContent = '请求中...';
            
            try {
                const startTime = Date.now();
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                const data = await response.json();
                
                const responseInfo = {
                    status: response.status,
                    statusText: response.statusText,
                    duration: duration + 'ms',
                    data: data
                };
                
                responseDiv.innerHTML = `<span class="${data.code === 0 ? 'success' : 'error'}">${JSON.stringify(responseInfo, null, 2)}</span>`;
                
                if (data.code === 0) {
                    localStorage.setItem('token', data.data.token);
                    alert('✅ 登录成功！Token 已保存到 localStorage');
                    updateStorage();
                } else {
                    alert('❌ 登录失败: ' + data.message);
                }
            } catch (error) {
                responseDiv.innerHTML = `<span class="error">错误: ${error.message}\n\n${error.stack}</span>`;
            }
        }
        
        function clearStorage() {
            localStorage.clear();
            updateStorage();
            alert('✅ localStorage 已清空');
        }
    </script>
</body>
</html>
